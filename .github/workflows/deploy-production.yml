# Deploy to the production droplet over SSH (git pull + pnpm build + systemd restart).
#
# Required repository secrets:
#   DEPLOY_HOST              — droplet hostname or IP
#   DEPLOY_USER              — SSH user (e.g. deploy, root)
#   DEPLOY_PATH              — absolute path to the repo on the server (e.g. /home/deploy/capstone)
#   DEPLOY_SSH_PRIVATE_KEY   — private key for that user (full PEM, including headers)
#
#
# Server prerequisites:
#   - Repo is a clone with remote access (deploy key or HTTPS credential).
#   - Node 20+ and corepack/pnpm available, or adjust the script.
#   - User can run: sudo systemctl restart capstone (NOPASSWD sudo for that command is typical).

name: Deploy production

on:
  workflow_dispatch:
    inputs:
      git_ref:
        description: 'Git branch or tag to deploy'
        required: false
        default: 'main'

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.2
        env:
          GIT_REF: ${{ github.event.inputs.git_ref || 'main' }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}
          command_timeout: 30m
          envs: GIT_REF,DEPLOY_PATH
          script_stop: true
          script: |
            set -euo pipefail
            cd "$DEPLOY_PATH"
            git fetch origin
            git checkout "$GIT_REF"
            git pull --ff-only origin "$GIT_REF"
            export NODE_OPTIONS=--max-old-space-size=8192
            corepack enable
            corepack prepare pnpm@10.30.3 --activate
            pnpm install --frozen-lockfile
            pnpm exec turbo run build --filter=capstone
            sudo systemctl restart capstone
            sudo systemctl is-active capstone
